<!DOCTYPE html>
<html lang="en">
<head>
    <title>Bubble Sort Visualizer</title>
    <style>
        body { background: #1a1a2e; color: white; display: flex; flex-direction: column; align-items: center; }
        .container { display: flex; align-items: flex-end; height: 200px; gap: 5px; margin-top: 50px; }
        .bar { width: 30px; background: #4ecca3; transition: 0.2s; text-align: center; font-size: 12px; color: black; }
        .comparing { background: #f0a500 !important; }
        .swapping { background: #e94560 !important; }
    </style>
</head>
<body>
    <h1>Bubble Sort Visualizer</h1>
    <button onclick="startVisualizer()">Start Sorting</button>
    <div class="container" id="visualizer"></div>

    <script>
        async function startVisualizer() {
            const res = await fetch('/api/sort/bubble');
            const trace = await res.json();
            const container = document.getElementById('visualizer');

            for (let step of trace) {
                // Render the array
                container.innerHTML = '';
                step.array.forEach((val, idx) => {
                    const bar = document.createElement('div');
                    bar.className = 'bar';
                    bar.style.height = (val * 3) + 'px';
                    bar.innerText = val;
                    
                    if (step.comparing.includes(idx)) bar.classList.add('comparing');
                    if (step.swapping.includes(idx)) bar.classList.add('swapping');
                    
                    container.appendChild(bar);
                });
                // Wait 300ms before showing the next step
                await new Promise(r => setTimeout(r, 300));
            }
        }
    </script>
</body>
</html>
